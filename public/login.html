<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VertexEC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/login.css" rel="stylesheet">
</head>
<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100">
      <div class="col-md-6 offset-md-3 col-lg-4 offset-lg-4">
        <div class="card shadow-lg">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <h1 class="text-primary fw-bold">VertexEC</h1>
              <p class="text-muted">Cotiza planos y controla tus proyectos de construcción</p>
            </div>

            <div id="alertContainer"></div>

            <div class="d-flex justify-content-between align-items-center mb-4 user-type-toggle">
              <button type="button" class="btn btn-outline-light btn-sm active" id="clientTypeBtn" onclick="setLoginType('user')">Cliente</button>
              <button type="button" class="btn btn-outline-light btn-sm" id="proTypeBtn" onclick="setLoginType('admin')">Empleado</button>
            </div>
            <p class="text-center text-muted mb-4" id="userTypeDescription">Accede como cliente para enviar solicitudes de cotización y revisar propuestas.</p>

            <!-- Tab: Login -->
            <div id="loginTab">
              <h4 class="mb-4 text-center">Ingress sus credenciales</h4>
              <form id="loginForm">
                <input type="hidden" id="loginRole" value="user">
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Contraseña</label>
                  <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Iniciar Sesión</button>
              </form>
              <p class="text-center text-muted mb-0">
                ¿No tienes cuenta? 
                <a href="#" onclick="toggleForm()">Registrarse</a>
              </p>
            </div>

            <!-- Tab: Sign Up -->
            <div id="signupTab" style="display: none;">
              <h4 class="mb-4 text-center">Crear Cuenta</h4>
              <form id="signupForm">
                <div class="mb-3">
                  <label for="signupName" class="form-label">Nombre Completo</label>
                  <input type="text" class="form-control" id="signupName" required>
                </div>
                <div class="mb-3">
                  <label for="signupEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="signupEmail" required>
                </div>
                <div class="mb-3">
                  <label for="signupPassword" class="form-label">Contraseña</label>
                  <input type="password" class="form-control" id="signupPassword" required>
                </div>
                <div class="mb-3">
                  <label for="signupCompany" class="form-label">Empresa (Opcional)</label>
                  <input type="text" class="form-control" id="signupCompany">
                </div>
                <div class="mb-3">
                  <label for="signupRole" class="form-label">Tipo de cuenta</label>
                  <select class="form-select" id="signupRole">
                    <option value="user">Cliente</option>
                    <option value="admin">Empleado</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">Registrarse</button>
              </form>
              <p class="text-center text-muted mb-0">
                ¿Ya tienes cuenta? 
                <a href="#" onclick="toggleForm()">Iniciar Sesión</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
