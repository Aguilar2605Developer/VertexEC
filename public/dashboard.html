<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - VertexEC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-clipboard-check"></i> VertexEC
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="nav-link" id="userNameDisplay"></span>
          </li>
        </ul>
      </div>
      <button class="btn btn-outline-light btn-sm ms-2" id="logoutBtn" onclick="logout()">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="row mb-4">
      <div class="col-md-6">
        <h2><i class="bi bi-file-earmark-text"></i> Mis Cotizaciones</h2>
      </div>
      <div class="col-md-6 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#quotationModal">
          <i class="bi bi-plus-circle"></i> Nueva Cotización
        </button>
      </div>
    </div>

    <div id="alertContainer"></div>

    <!-- Tabs -->
    <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="quotations-tab" data-bs-toggle="tab" data-bs-target="#quotations" type="button" role="tab">Cotizaciones</button>
      </li>
      <li class="nav-item" role="presentation" id="usersTab" style="display: none;">
        <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab">Usuarios</button>
      </li>
    </ul>

    <div class="tab-content" id="dashboardTabContent">
      <!-- Cotizaciones Tab -->
      <div class="tab-pane fade show active" id="quotations" role="tabpanel">
        <div class="row mb-3">
          <div class="col-md-6">
            <h4><i class="bi bi-file-earmark-text"></i> Cotizaciones</h4>
          </div>
          <div class="col-md-6 text-end">
            <button class="btn btn-primary" id="newQuotationBtn" data-bs-toggle="modal" data-bs-target="#quotationModal">
              <i class="bi bi-plus-circle"></i> Nueva Cotización
            </button>
          </div>
        </div>

<!-- Contenedor de cotizaciones -->
        <div id="quotationsContainer">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-light">
                <tr>
                  <th>Título</th>
                  <th>Cliente</th>
                  <th>Total</th>
                  <th>Estado</th>
                  <th>Creada</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="quotationsTable">
                <tr>
                  <td colspan="6" class="text-center text-muted py-4">
                    <i class="bi bi-inbox"></i> No hay cotizaciones aún
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Usuarios Tab -->
      <div class="tab-pane fade" id="users" role="tabpanel">
        <div class="row mb-3">
          <div class="col-md-6">
            <h4><i class="bi bi-people"></i> Gestión de Usuarios</h4>
          </div>
          <div class="col-md-6 text-end">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#userModal">
              <i class="bi bi-person-plus"></i> Nuevo Usuario
            </button>
          </div>
        </div>

        <!-- Tabla de usuarios -->
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-light">
                  <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Empresa</th>
                    <th>Rol</th>
                    <th>Creado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="usersTable">
                  <tr>
                    <td colspan="6" class="text-center text-muted py-4">
                      <i class="bi bi-inbox"></i> Cargando usuarios...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Nueva/Editar Cotización -->
  <div class="modal fade" id="quotationModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Nueva Cotización</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="quotationForm">
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Título</label>
                  <input type="text" class="form-control" id="formTitle" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Estado</label>
                  <select class="form-select" id="formStatus">
                    <option value="draft">Borrador</option>
                    <option value="sent">Enviada</option>
                    <option value="accepted">Aceptada</option>
                    <option value="rejected">Rechazada</option>
                    <option value="completed">Completada</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Nombre del Cliente</label>
                  <input type="text" class="form-control" id="formClientName" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Email del Cliente</label>
                  <input type="email" class="form-control" id="formClientEmail">
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" id="formDescription" rows="2"></textarea>
            </div>

            <!-- Materiales -->
            <div class="card mb-3">
              <div class="card-header">
                <h6 class="mb-0">Materiales</h6>
              </div>
              <div class="card-body">
                <div id="materialsContainer"></div>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addMaterialRow()">
                  <i class="bi bi-plus"></i> Agregar Material
                </button>
              </div>
            </div>

            <!-- Mano de Obra -->
            <div class="card mb-3">
              <div class="card-header">
                <h6 class="mb-0">Mano de Obra</h6>
              </div>
              <div class="card-body">
                <div id="laborContainer"></div>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addLaborRow()">
                  <i class="bi bi-plus"></i> Agregar Mano de Obra
                </button>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Descuento</label>
                  <input type="number" class="form-control" id="formDiscount" min="0" step="0.01" value="0">
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Total Final</label>
                  <input type="text" class="form-control" id="formTotal" readonly value="$0.00">
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Notas</label>
              <textarea class="form-control" id="formNotes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="saveQuotation()">Guardar Cotización</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Ver Detalles -->
  <div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalles de Cotización</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailsContent">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-primary" onclick="editCurrentQuotation()">Editar</button>
          <button type="button" class="btn btn-danger" onclick="deleteCurrentQuotation()">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Nuevo/Editar Usuario -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalTitle">Nuevo Usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="userForm">
            <div class="mb-3">
              <label for="userName" class="form-label">Nombre *</label>
              <input type="text" class="form-control" id="userName" required>
            </div>
            <div class="mb-3">
              <label for="userEmail" class="form-label">Email *</label>
              <input type="email" class="form-control" id="userEmail" required>
            </div>
            <div class="mb-3" id="passwordField">
              <label for="userPassword" class="form-label">Contraseña *</label>
              <input type="password" class="form-control" id="userPassword" required>
            </div>
            <div class="mb-3">
              <label for="userCompany" class="form-label">Empresa</label>
              <input type="text" class="form-control" id="userCompany">
            </div>
            <div class="mb-3">
              <label for="userPhone" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="userPhone">
            </div>
            <div class="mb-3">
              <label for="userRole" class="form-label">Rol</label>
              <select class="form-select" id="userRole">
                <option value="user">Usuario</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="saveUser()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
